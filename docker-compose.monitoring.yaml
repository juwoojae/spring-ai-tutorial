services:                                           # 모니터링용 컨테이너 목록
  prometheus:                                       # Prometheus 서비스 이름
    container_name:  spring-ai-tutorial-prometheus             # 실행될 Prometheus 컨테이너 이름
    restart: unless-stopped                         # 직접 중지하지 않는 한 장애나 재부팅 후 자동 재시작
    image: prom/prometheus:latest                   # Docker Hub의 최신 Prometheus 이미지 사용
    volumes:                                        # 설정 파일과 수집 데이터를 컨테이너에 연결
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro # 로컬 Prometheus 설정을 읽기 전용으로 마운트
      - prometheus_data:/prometheus                 # 수집된 시계열 데이터를 named volume에 영구 저장
    ports:                                          # 호스트와 컨테이너 사이의 포트 연결
      - "9090:9090"                       # 외부에서 Prometheus UI와 API 접근 허용
    networks:                                       # 애플리케이션과 통신할 Docker 네트워크
      - spring-ai-tutorial                          # Spring AI 애플리케이션의 기본 네트워크에 연결

volumes:                                            # Compose에서 관리할 named volume 선언
  prometheus_data:                                  # Prometheus 데이터 영구 보관용 볼륨

networks:                                           # 외부에서 이미 생성된 Docker 네트워크 선언
  spring-ai-tutorial:                               # 이 Compose 내부에서 사용할 네트워크 별칭
    external: true                                  # 새로 만들지 않고 기존 네트워크를 재사용
    name: spring-ai-tutorial_default                # 기존 Spring AI Compose의 실제 네트워크 이름
