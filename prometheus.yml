# Prometheus의 공통 수집 설정
global:
  scrape_interval: 15s # 모든 수집 대상에서 메트릭을 가져오는 기본 주기

# Prometheus가 메트릭을 수집할 대상 목록
scrape_configs:
  - job_name: "spring-ai-tutorial" # Prometheus 화면에서 식별할 작업 이름
    metrics_path: "/monitor/prometheus" # Spring Boot Actuator의 Prometheus 엔드포인트
    static_configs:
      - targets: # 고정된 수집 대상 목록
          - "spring-ai-tutorial.duckdns.org/:9091" # Docker 서비스명과 Actuator 전용 포트
